name: Build and Publish API Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image reference
        id: prep
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_name="${GITHUB_REPOSITORY##*/}"
          echo "image_ref=ghcr.io/${owner}/${repo_name}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_ref }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short,prefix=sha-

      - name: Build local smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: local/nexus-api-server:smoke
          cache-from: type=gha,scope=nexus-api-server
          cache-to: type=gha,mode=max,scope=nexus-api-server

      - name: Smoke test API and worker with user override
        run: |
          set -euo pipefail

          docker network create smoke-net
          trap 'docker logs smoke-api || true; docker logs smoke-worker || true; docker logs smoke-postgres || true; docker rm -f smoke-api smoke-worker smoke-postgres >/dev/null 2>&1 || true; docker network rm smoke-net >/dev/null 2>&1 || true' EXIT

          docker run -d --name smoke-postgres --network smoke-net \
            -e POSTGRES_DB=nexus_kb \
            -e POSTGRES_USER=nexus \
            -e POSTGRES_PASSWORD=nexus \
            postgres:17

          for _ in $(seq 1 45); do
            if docker exec smoke-postgres pg_isready -U nexus -d nexus_kb >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          mkdir -p "${RUNNER_TEMP}/mailing-lists"
          echo "probe" > "${RUNNER_TEMP}/mailing-lists/.probe"

          docker run --rm --user 12345:12345 \
            -v "${RUNNER_TEMP}/mailing-lists:/opt/nexus/mailing-lists:ro" \
            --entrypoint /usr/bin/test \
            local/nexus-api-server:smoke \
            -e /opt/nexus/mailing-lists

          docker run -d --name smoke-api --network smoke-net --user 12345:12345 -p 3000:3000 \
            -e NEXUS__DATABASE__URL=postgresql://nexus:nexus@smoke-postgres:5432/nexus_kb \
            -e NEXUS__MEILI__URL=http://127.0.0.1:7700 \
            -e NEXUS__MEILI__MASTER_KEY=ci-dev-key \
            local/nexus-api-server:smoke

          for _ in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:3000/api/v1/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:3000/api/v1/healthz" >/dev/null

          docker run -d --name smoke-worker --network smoke-net --user 12345:12345 \
            -e NEXUS__DATABASE__URL=postgresql://nexus:nexus@smoke-postgres:5432/nexus_kb \
            -e NEXUS__MEILI__URL=http://127.0.0.1:7700 \
            -e NEXUS__MEILI__MASTER_KEY=ci-dev-key \
            -e NEXUS__MAIL__MIRROR_ROOT=/opt/nexus/mailing-lists \
            -v "${RUNNER_TEMP}/mailing-lists:/opt/nexus/mailing-lists:ro" \
            local/nexus-api-server:smoke \
            /usr/local/bin/worker

          sleep 8
          docker ps --filter name=smoke-worker --format '{{.Names}}' | grep -q '^smoke-worker$'

      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: local/nexus-api-server:smoke
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          exit-code: "1"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nexus-api-server
          cache-to: type=gha,mode=max,scope=nexus-api-server
          sbom: true
          provenance: mode=max
